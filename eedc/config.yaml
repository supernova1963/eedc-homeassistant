# Home Assistant Add-on Konfiguration
# https://developers.home-assistant.io/docs/add-ons/configuration

name: "eedc - Energie Effizienz Data Center"
description: "Lokale PV-Anlagen Auswertung und Wirtschaftlichkeitsanalyse"
version: "3.44.0"
slug: "eedc"
url: "https://github.com/supernova1963/eedc-homeassistant"

# Breaking Change Warnung für v2.0.0
# Erfordert Neuinstallation wegen geändertem Volume-Mapping (config:ro)
breaking_versions:
  - "2.0.0"

# Unterstützte Architekturen
arch:
  - aarch64
  - amd64

# Container-Einstellungen
init: false
startup: application
boot: auto

# Home Assistant Integration
homeassistant_api: true
hassio_api: true

# Ingress (nahtlose UI-Integration)
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:solar-power"
panel_title: "eedc"

# Benutzer-Optionen
options:
  log_level: info
  ha_recorder_db_url: ""
  live_snapshot_5min_enabled: false
  mqtt:
    enabled: false
    host: "core-mosquitto"
    port: 1883
    username: ""
    password: ""
    auto_publish: false
    publish_interval_minutes: 60

schema:
  log_level: list(debug|info|warning|error)
  # Deprecated (Phase 5 #303): reportlab entfernt, Wert wird ignoriert. Bleibt
  # im Schema, damit bestehende Konfigurationen mit gesetzter Option die
  # Options-Validierung beim Add-on-Update nicht brechen.
  pdf_engine: list(reportlab|weasyprint)?
  ha_recorder_db_url: str?
  live_snapshot_5min_enabled: bool?
  mqtt:
    enabled: bool?
    host: str?
    port: int(1,65535)?
    username: str?
    password: password?
    auto_publish: bool?
    publish_interval_minutes: int(5,1440)?

# Persistenter Speicher
map:
  - data:rw
  - config:ro  # Lesezugriff auf HA-Config für statistics Datenbank-Abfrage

# Hot-Backup-Konsistenz: WAL ins Hauptfile zurückspielen + truncaten, bevor
# der Supervisor /data tarballt. App bleibt online, MQTT-Inbound läuft weiter.
backup_pre: "sqlite3 /data/eedc.db 'PRAGMA wal_checkpoint(TRUNCATE);'"

# Netzwerk (nur intern via Ingress)
# Port 8099 ist standardmäßig deaktiviert (null) — eedc läuft sicher über
# Ingress. Nur freigeben, wer die eedc-Werte per REST-Sensor (rest:-Plattform
# in der configuration.yaml) nach HA holen will; MQTT braucht keine Freigabe.
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Nur für den REST-Export der eedc-Sensoren nach Home Assistant freigeben (z. B. 8099). Standardmäßig aus — für die normale Nutzung und den MQTT-Export nicht nötig."

# Vorgebautes Image von GitHub Container Registry
image: "ghcr.io/supernova1963/eedc-homeassistant-{arch}"
