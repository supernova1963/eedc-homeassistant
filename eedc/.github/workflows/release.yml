name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Extract section between current version header and next version header
          NOTES=$(sed -n "/^## \[${{ steps.version.outputs.VERSION }}\]/,/^## \[/{/^## \[/!p}" CHANGELOG.md)
          # Write to file for gh release
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create or update GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, updating notes..."
            gh release edit "$GITHUB_REF_NAME" \
              --title "eedc $GITHUB_REF_NAME" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "eedc $GITHUB_REF_NAME" \
              --notes-file /tmp/release-notes.md
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/supernova1963/eedc:${{ steps.version.outputs.VERSION }}
            ghcr.io/supernova1963/eedc:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
