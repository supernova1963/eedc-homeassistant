<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" fill="none">
  <defs>
    <!-- eedc Brand-Gradient -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>

    <!-- Radialer Gradient für zentralen Glow -->
    <radialGradient id="centerGlow" cx="50%" cy="47%" r="35%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0" />
    </radialGradient>

    <!-- Radialer Gradient für Sonnen-Glow oben -->
    <radialGradient id="sunGlow" cx="50%" cy="0%" r="40%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.06" />
      <stop offset="60%" stop-color="#eab308" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#eab308" stop-opacity="0" />
    </radialGradient>

    <!-- Subtiler Pattern für Solarzellen -->
    <pattern id="solarGrid" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="none" />
      <line x1="0" y1="12" x2="24" y2="12" stroke="#06b6d4" stroke-width="0.3" stroke-opacity="0.08" />
      <line x1="12" y1="0" x2="12" y2="24" stroke="#06b6d4" stroke-width="0.3" stroke-opacity="0.08" />
    </pattern>

    <!-- Hexagon-Pattern für Technik-Feel -->
    <pattern id="hexGrid" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 15 L60 37 L30 52 L0 37 L0 15 Z" fill="none" stroke="#06b6d4" stroke-width="0.4" stroke-opacity="0.04" />
    </pattern>
  </defs>

  <!-- Hintergrund-Pattern: subtiles Hex-Raster -->
  <rect width="600" height="420" fill="url(#hexGrid)" />

  <!-- Sonnen-Glow oben (PV-Zone) -->
  <rect width="600" height="420" fill="url(#sunGlow)" />

  <!-- Zentraler Haus-Glow -->
  <rect width="600" height="420" fill="url(#centerGlow)" />

  <!-- Energie-Ringe um Zentrum (Haus-Position ~300,200) -->
  <circle cx="300" cy="195" r="60" stroke="url(#brand)" stroke-width="0.5" stroke-opacity="0.06" fill="none" />
  <circle cx="300" cy="195" r="100" stroke="url(#brand)" stroke-width="0.4" stroke-opacity="0.05" fill="none" />
  <circle cx="300" cy="195" r="150" stroke="url(#brand)" stroke-width="0.3" stroke-opacity="0.04" fill="none" />
  <circle cx="300" cy="195" r="210" stroke="url(#brand)" stroke-width="0.3" stroke-opacity="0.03" fill="none" />

  <!-- Dezente Sonnenstrahlen oben -->
  <g stroke="#eab308" stroke-opacity="0.05" stroke-width="0.6" stroke-linecap="round">
    <line x1="300" y1="5" x2="300" y2="40" />
    <line x1="260" y1="8" x2="270" y2="42" />
    <line x1="340" y1="8" x2="330" y2="42" />
    <line x1="220" y1="15" x2="240" y2="46" />
    <line x1="380" y1="15" x2="360" y2="46" />
    <line x1="185" y1="28" x2="215" y2="52" />
    <line x1="415" y1="28" x2="385" y2="52" />
  </g>

  <!-- Energie-Fluss-Andeutungen: geschwungene Linien -->
  <g stroke="url(#brand)" fill="none" stroke-linecap="round">
    <!-- Von oben (PV) zum Zentrum -->
    <path d="M200 70 Q220 130 300 190" stroke-width="0.6" stroke-opacity="0.04" />
    <path d="M400 70 Q380 130 300 190" stroke-width="0.6" stroke-opacity="0.04" />

    <!-- Vom Zentrum nach unten (Verbraucher) -->
    <path d="M300 200 Q260 280 180 340" stroke-width="0.5" stroke-opacity="0.03" />
    <path d="M300 200 Q340 280 420 340" stroke-width="0.5" stroke-opacity="0.03" />

    <!-- Links (Netz) zum Zentrum -->
    <path d="M60 195 Q150 180 290 195" stroke-width="0.5" stroke-opacity="0.03" />

    <!-- Rechts (Batterie) zum Zentrum -->
    <path d="M540 195 Q450 210 310 195" stroke-width="0.5" stroke-opacity="0.03" />
  </g>

  <!-- Kleine Energie-Partikel / Dots -->
  <g fill="#06b6d4" fill-opacity="0.06">
    <circle cx="150" cy="100" r="2" />
    <circle cx="450" cy="100" r="2" />
    <circle cx="80" cy="200" r="1.5" />
    <circle cx="520" cy="200" r="1.5" />
    <circle cx="200" cy="350" r="1.8" />
    <circle cx="400" cy="350" r="1.8" />
    <circle cx="300" cy="60" r="2.2" />
  </g>
  <g fill="#34d399" fill-opacity="0.05">
    <circle cx="120" cy="150" r="1.5" />
    <circle cx="480" cy="150" r="1.5" />
    <circle cx="250" cy="380" r="1.5" />
    <circle cx="350" cy="380" r="1.5" />
    <circle cx="100" cy="300" r="1.2" />
    <circle cx="500" cy="300" r="1.2" />
  </g>

  <!-- Blitz-Symbol dezent im Hintergrund (Energie) -->
  <g transform="translate(285, 155)" stroke="#34d399" stroke-opacity="0.04" stroke-width="1" fill="none" stroke-linejoin="round">
    <path d="M15 0 L5 18 L14 18 L10 32 L22 12 L13 12 Z" />
  </g>

  <!-- Dezente Wellenlinien unten (Energie-Wellen) -->
  <g stroke="#06b6d4" stroke-opacity="0.03" stroke-width="0.5" fill="none">
    <path d="M0 400 Q75 390 150 400 Q225 410 300 400 Q375 390 450 400 Q525 410 600 400" />
    <path d="M0 410 Q75 400 150 410 Q225 420 300 410 Q375 400 450 410 Q525 420 600 410" />
  </g>
</svg>
