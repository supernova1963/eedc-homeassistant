name: Deploy Website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'CHANGELOG.md'
      - 'eedc/frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      # ── IA-v4-Vorschau (Etappe 2): eigener Vite-Build, ohne Backend, eigene
      #    Pages-Base /eedc-homeassistant/preview/. Output wird in website/public/
      #    eingeschleust, sodass Astro es nach website/dist/preview/ übernimmt.
      #    Wegwerf-Vorschau — der Output ist gitignored, NICHT im Repo committet.
      - name: Install frontend dependencies (preview)
        working-directory: eedc/frontend
        run: npm ci

      - name: Build IA-v4 preview
        working-directory: eedc/frontend
        run: npm run build:preview

      - name: Stage preview into website public dir
        run: |
          mkdir -p website/public/preview
          cp -r eedc/frontend/preview-dist/. website/public/preview/

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
